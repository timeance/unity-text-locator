name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            unity-text-locator/requirements.txt
            ainiee-translate/requirements.txt
      - name: Install runtime dependencies
        run: >-
          python -m pip install
          -r unity-text-locator/requirements.txt
          -r ainiee-translate/requirements.txt
      - name: Compile Python sources
        run: python -m compileall -q unity-text-locator/scripts ainiee-translate/scripts
      - name: Run regression tests
        run: python -m unittest discover -s tests -v
      - name: Smoke-test Unity command help
        shell: python
        run: |
          import pathlib
          import subprocess
          import sys

          scripts = sorted(pathlib.Path("unity-text-locator/scripts").glob("*.py"))
          for script in scripts:
              subprocess.run([sys.executable, str(script), "--help"], check=True, stdout=subprocess.DEVNULL)
          print(f"validated {len(scripts)} command entry points")
